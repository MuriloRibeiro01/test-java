image: maven:3.9-eclipse-temurin-21
# Arquivo deve conter:

# Stage de build;
stages:
  - build
  - test
  - deploy

# Job
buildMaven:
  stage: build
  script:
    - mvn clean compile

testMaven:
  stage: test
  script:
    - mvn test
  artifacts:
    when: always
    paths:
      - target/surefire-reports/TEST-*.xml
    reports:
      junit: target/surefire-reports/TEST-*.xml

      

# Stage de deploy (simulado com echo).
deployMaven:
  stage: deploy
  only:
    - main
  script:
    - echo "Efetuando deploy..."